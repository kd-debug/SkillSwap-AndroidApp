name: skillswap
description: A micro skill exchange app
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.0.0

  # HTTP & API
  dio: ^5.4.0
  http: ^1.2.1

  # Image Handling
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Notifications
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  permission_handler: ^12.0.1

  # Advanced Features - Sensors & Location
  sensors_plus: ^7.0.0
  geolocator: ^14.0.2

  # Advanced Features - Media
  image_picker: ^1.1.0

  # Advanced Features - Charts
  fl_chart: ^1.2.0

  # Advanced Features - QR Scanner
  mobile_scanner: ^7.2.0

  # Advanced Features - Maps
  google_maps_flutter: ^2.6.0
  flutter_riverpod: ^3.3.1
  url_launcher: ^6.3.1
  google_sign_in: ^6.3.0
  desktop_webview_auth: ^0.0.16

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true